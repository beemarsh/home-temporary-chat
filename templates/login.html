<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ config.ui.title }} — Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="theme-{{ config.ui.theme }}">
    <div class="login-container">
        <div class="login-card">
            <div class="login-icon">&#x1f512;</div>
            <h1>{{ config.ui.title }}</h1>
            <p class="login-subtitle">Ephemeral home network chat</p>
            {% if error %}
            <div class="error-banner">{{ error }}</div>
            {% endif %}
            <form method="POST" autocomplete="off">
                <div class="form-group">
                    <input type="text" name="username" placeholder="Nickname" maxlength="20" required autofocus>
                </div>
                <div class="form-group">
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary">Enter Chat</button>
            </form>
        </div>
    </div>
</body>
</html>
