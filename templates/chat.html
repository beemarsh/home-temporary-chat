<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ config.ui.title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="theme-{{ config.ui.theme }}">
    <div class="chat-app">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-left">
                <h1>{{ config.ui.title }}</h1>
                <span class="user-count" id="userCount">0 online</span>
            </div>
            <div class="header-right">
                <span class="e2e-status inactive" id="e2eStatus">E2E off</span>
                <button class="btn-e2e-change" id="e2eBtnChange" title="Change passphrase">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
                    </svg>
                </button>
                <span class="ttl-badge">msgs expire {{ config.chat.message_ttl_seconds }}s</span>
                <a href="{{ url_for('logout') }}" class="btn-logout">Logout</a>
            </div>
        </header>

        <!-- Messages -->
        <div class="messages-container" id="messagesContainer">
            <div class="messages-list" id="messagesList"></div>
        </div>

        <!-- Upload preview -->
        <div class="upload-preview" id="uploadPreview" style="display:none;">
            <span class="upload-filename" id="uploadFilename"></span>
            <button class="upload-cancel" id="uploadCancel">&times;</button>
        </div>

        <!-- Input -->
        <div class="chat-input-area">
            <button class="btn-attach" id="btnAttach" title="Attach file">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                </svg>
            </button>
            <input type="file" id="fileInput" style="display:none;">
            <textarea id="messageInput" placeholder="Type a message..." rows="1" maxlength="{{ config.chat.max_message_length }}"></textarea>
            <button class="btn-send" id="btnSend" title="Send">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- E2E Passphrase Modal -->
    <div class="e2e-modal" id="e2eModal" style="display:none;">
        <div class="e2e-modal-card">
            <div class="e2e-modal-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
                </svg>
            </div>
            <h2>End-to-End Encryption</h2>
            <p>Enter a shared passphrase known to all participants. Messages are encrypted in your browser before being sent.</p>
            <div class="form-group">
                <input type="password" id="e2ePassphrase" placeholder="Shared passphrase" autocomplete="off">
            </div>
            <button class="btn-primary" id="e2eBtnSet">Enable Encryption</button>
            <button class="btn-skip" id="e2eBtnSkip">Skip (no encryption)</button>
            <p class="e2e-modal-hint">All participants must use the same passphrase to read messages.</p>
        </div>
    </div>

    <script>
      // Public URL prefix this app is mounted under (e.g. "/chat"). Empty when served at root.
      window.__APP_PREFIX__ = {{ request.script_root | tojson }};
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="{{ url_for('static', filename='crypto.js') }}"></script>
    <script src="{{ url_for('static', filename='chat.js') }}"></script>
</body>
</html>
